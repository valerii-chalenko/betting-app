services:

  namesrv:
    container_name: rocketmq-namesrv
    image: apache/rocketmq:5.4.0
    environment:
      JAVA_OPT_EXT: -server -Xms256m -Xmx256m -Xmn256m
    networks:
      - backend-network
    ports:
      - "127.0.0.1:9876:9876"
    command: sh ./mqnamesrv

  broker:
    container_name: rocketmq-broker
    image: apache/rocketmq:5.4.0
    environment:
      NAMESRV_ADDR: namesrv:9876
      JAVA_OPT_EXT: -server -Xms512m -Xmx512m -Xmn256m
      BROKER_CONF: |
        brokerClusterName = MinimalCluster
        brokerName = broker-a
        brokerId = 0
        deleteWhen = 04
        fileReservedTime = 48
        brokerRole = ASYNC_MASTER
        flushDiskType = ASYNC_FLUSH
        brokerIP1=localhost
    networks:
      - backend-network
    ports:
      # Dashboard pass through
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:10909:10909"
      - "127.0.0.1:10911:10911"
      - "127.0.0.1:10912:10912"
    command: |
      bash -c '
      mkdir -p /home/rocketmq/conf && 
      echo "$$BROKER_CONF" > /home/rocketmq/conf/broker.conf && 
      ./mqbroker -c /home/rocketmq/conf/broker.conf
      '

  dashboard:
    container_name: rocketmq-dashboard
    image: apacherocketmq/rocketmq-dashboard:2.1.0
    # Access broker with localhost, port 8080 exposed in broker service
    networks:
      - backend-network
    environment:
      JAVA_OPTS: -Drocketmq.namesrv.addr=namesrv:9876

  # Kafka
  kafka-zookeeper:
    image: confluentinc/cp-zookeeper:7.9.6
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - backend-network
    ports:
      - 22181:2181

  kafka:
    image: confluentinc/cp-kafka:7.9.6
    depends_on:
      - kafka-zookeeper
    networks:
      - backend-network
    ports:
      - 29092:29092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: kafka-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  kafka_data:
    driver: local

networks:
  backend-network:
    driver: bridge
