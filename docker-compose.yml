services:

  # RocketMQ
  rocketmq-namesrv:
    image: apache/rocketmq:5.3.4
    container_name: rmqnamesrv
    ports:
      - 9876:9876
    networks:
      - backend-network
    command: sh mqnamesrv

  rocketmq-broker:
    image: apache/rocketmq:5.3.4
    container_name: rmqbroker
    ports:
      - 10909:10909
      - 10911:10911
      - 10912:10912
    environment:
      - NAMESRV_ADDR=rmqnamesrv:9876
    depends_on:
      - rocketmq-namesrv
    networks:
      - backend-network
    command: sh mqbroker

  rocketmq-proxy:
    image: apache/rocketmq:5.3.4
    container_name: rmqproxy
    networks:
      - backend-network
    depends_on:
      - rocketmq-broker
      - rocketmq-namesrv
    ports:
      - 8080:8080
      - 8081:8081
    restart: on-failure
    environment:
      - NAMESRV_ADDR=rmqnamesrv:9876
    command: sh mqproxy

  # Kafka
  kafka-zookeeper:
    image: confluentinc/cp-zookeeper:7.9.6
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - backend-network
    ports:
      - 22181:2181

  kafka:
    image: confluentinc/cp-kafka:7.9.6
    depends_on:
      - kafka-zookeeper
    networks:
      - backend-network
    ports:
      - 29092:29092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: kafka-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  kafka_data:
    driver: local

networks:
  backend-network:
    driver: bridge
