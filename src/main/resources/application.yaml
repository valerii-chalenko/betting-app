spring:
  application:
    name: betting

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:h2:mem:betting;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  h2:
    console:
      enabled: true
