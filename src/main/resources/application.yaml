server:
  port: 8081

spring:
  application:
    name: betting

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:h2:mem:betting;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jackson:
    default-property-inclusion: non_null

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: outcomes-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "org.bajiepka.betting.dto.event"
    listener:
      ack-mode: manual_immediate
    template:
      default-topic: event-outcomes

  h2:
    console:
      enabled: true

rocketmq:
  enabled: ${ROCKETMQ_ENABLED:true}
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer.group: settle-bets-topic
